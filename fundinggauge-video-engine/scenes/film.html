const XF = 280;   /* scene crossfade (ms) */

    segs:[
      {mod:'logoBoot',        w:3000, opts:{brand:'gauge'}},

      {mod:'brokerDashboard', w:4600, opts:{headline:'Score any candidate, at any scale.'}},
      {mod:'eventKiosk',      w:4600, opts:{}},

    ],
    inserts:[
      {atFrac:0.03, dur:300, kind:'doubt'},

    ],

  'optimizer-trailer-30s': {

    cta:'Command your stack', posterFrac:0.42,
    segs:[
      {mod:'logoBoot',         w:3000, opts:{brand:'optimizer'}},
      {mod:'ignition',         w:3200, opts:{label:'Command Ready',cap:'ENGAGE OPTIMIZATION ENGINE'}},
      {mod:'optimizerCommand', w:10800,opts:{}},
      {mod:'stackingSequence', w:4800, opts:{title:'Stack Strategy'}},
      {mod:'scoreGauge',       w:3200, opts:{headline:'Optimized, not guessed.',verdict:'OPTIMIZED · PEAK'}},
      {mod:'endCard',          w:5000, opts:{brand:'optimizer',cta:'Command your stack.',url:'fundingoptimizer.com'}},
    ],
    inserts:[
      {atFrac:0.04, dur:300, kind:'doubt'},

      {atFrac:0.70, dur:200, kind:'numbers'},
    ],
  },
};

/* ── BUILD SELECTED CUT ──────────────────────────────────────────── */
const params = new URLSearchParams(location.search);
const CUT_NAME = params.get('cut') || 'public-launch-30s';
const cut = CUTS[CUT_NAME];
if (!cut) throw new Error('unknown cut: ' + CUT_NAME);

const scenesEl = document.getElementById('scenes');
const insertsEl = document.getElementById('inserts');

/* scale segment weights so the cut hits its exact target length */
const rawTotal = cut.segs.reduce((s, x) => s + x.w, 0);
const scale = cut.target / rawTotal;
let tcur = 0;
const SEGS = cut.segs.map(s => {
  const dur = s.w * scale;
  const layer = mk('div', 'fg-layer');
  scenesEl.appendChild(layer);
  FG.modules[s.mod].build(layer, s.opts || {});
  const seg = {mod:s.mod, opts:s.opts || {}, start:tcur, dur, layer};
  tcur += dur;
  return seg;
});
const INS = (cut.inserts || []).map(ins => {
  const layer = mk('div', 'fg-layer');
  layer.style.padding = '0';
  insertsEl.appendChild(layer);
  FG.inserts.build(layer, ins.kind);
  layer.style.display = 'none';
  return {layer, at:ins.atFrac * cut.target, dur:ins.dur, kind:ins.kind};
});

document.getElementById('hud-bl').textContent =
  cut.brand === 'optimizer' ? 'FUNDINGOPTIMI⚡≡R™' : 'FUNDINGGAUG≡™';

/* ── IGNITION PARTICLE FIELD ─────────────────────────────────────── */
const cv = document.getElementById('fx'), cx = cv.getContext('2d');
let CW = 0, CH = 0;
function sizeCanvas(){ CW = cv.width = innerWidth; CH = cv.height = innerHeight; }
addEventListener('resize', sizeCanvas); sizeCanvas();
const NP = 90;
function drawParticles(t, intensity){
  cx.clearRect(0, 0, CW, CH);
  const s = t / 1000;
  for (let i = 0; i < NP; i++){
    const speed = 20 + FGH.hash(i + 9) * 70;
    const size  = .7 + FGH.hash(i + 50) * 2.6;
    const span  = CH + 80;
    const y = CH + 40 - (((s * speed) + (FGH.hash(i) * span)) % span);
    const x = FGH.hash(i + 3) * CW + Math.sin(s * .5 + i) * 22;
    const fl = .55 + .45 * Math.sin(s * 5 + i * 1.7);
    const a = (.10 + .55 * FGH.hash(i + 7)) * fl * intensity;
    if (a <= .003) continue;
    const g = cx.createRadialGradient(x, y, 0, x, y, size * 6);
    g.addColorStop(0, 'rgba(120,255,180,' + a + ')');
    g.addColorStop(.4, 'rgba(43,255,136,' + (a * .5) + ')');
    g.addColorStop(1, 'rgba(43,255,136,0)');
    cx.fillStyle = g;
    cx.beginPath(); cx.arc(x, y, size * 6, 0, 6.2832); cx.fill();
  }
}

/* ── MASTER RENDER ───────────────────────────────────────────────── */
const hud = document.getElementById('hud');
const fadeout = document.getElementById('fadeout');
const TARGET = cut.target;

function render(tIn){
  const t = clamp(tIn, 0, TARGET);

  /* particle intensity follows the active segment */
  let pi = 0.22;
  for (const s of SEGS){
    if (t >= s.start - XF && t <= s.start + s.dur){
      if (s.mod === 'ignition') pi = Math.max(pi, .92);
      else if (s.mod === 'endCard') pi = Math.max(pi, .42);
      else if (s.mod === 'optimizerCommand') pi = Math.max(pi, .5);
    }
  }
  drawParticles(t, pi);

  /* segments + crossfade */
  SEGS.forEach((s, i) => {
    const isLast = i === SEGS.length - 1;
    const a = s.start, b = s.start + s.dur;
    const fo = isLast ? 1 : XF;
    let o = 0;
    if (t >= a - XF && t <= b)
      o = Math.min(clamp((t - (a - XF)) / XF, 0, 1), clamp((b - t) / fo, 0, 1));
    s.layer.style.opacity = o;
    s.layer.style.display = o > 0 ? 'flex' : 'none';
    if (o > 0){
      const lt = clamp(t - a, 0, s.dur);
      const enter = easeOut(clamp(lt / 600, 0, 1));
      s.layer.style.transform = 'scale(' + (1.04 - .04 * enter) + ')';
      FG.modules[s.mod].update(s.layer, lt, s.dur, s.opts);
    }
  });

  /* insert thought-flashes */
  INS.forEach(ins => {
    if (t >= ins.at && t <= ins.at + ins.dur){
      ins.layer.style.display = 'block';
      FG.inserts.update(ins.layer, t - ins.at, ins.dur);
    } else {
      ins.layer.style.display = 'none';
    }
  });

  hud.style.opacity = env(t, 300, TARGET - 300, 400, 500) * .9;
  fadeout.style.opacity = clamp((t - (TARGET - 650)) / 650, 0, 1);
}

/* ── PUBLIC API ──────────────────────────────────────────────────── */
window.__render = ms => render(ms);
window.__duration = TARGET / 1000;
window.__posterMs = (cut.posterFrac || 0.5) * TARGET;
window.__cutInfo = {
  name:CUT_NAME, audience:cut.audience, offer:cut.offer,
  cta:cut.cta, brand:cut.brand, duration:TARGET / 1000,
  scenes:SEGS.map(s => s.mod),
  inserts:INS.map(i => i.kind),
};

if (/[?&]render=1/.test(location.search)){
  render(0);
  window.__ready = true;
} else {
  let start = null;
  (function loop(ts){
    if (start === null) start = ts;
    render((ts - start) % TARGET);
    requestAnimationFrame(loop);
  })(performance.now());
}
</script>
